name: CI/CD

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    name: Backend build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Build
        working-directory: backend
        run: npm run build

  frontend:
    name: Frontend build and lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Lint
        working-directory: frontend
        run: npm run lint

  deploy_frontend:
    name: Deploy frontend
    runs-on: ubuntu-latest
    needs: frontend
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Check Vercel secrets
        id: vercel
        run: |
          if [ -n "$VERCEL_TOKEN" ] && [ -n "$VERCEL_ORG_ID" ] && [ -n "$VERCEL_PROJECT_ID" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Skipping deploy until Vercel secrets are configured."
          fi

      - name: Checkout
        if: steps.vercel.outputs.configured == 'true'
        uses: actions/checkout@v4

      - name: Setup Node
        if: steps.vercel.outputs.configured == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        if: steps.vercel.outputs.configured == 'true'
        working-directory: frontend
        run: npm ci

      - name: Pull Vercel environment
        if: steps.vercel.outputs.configured == 'true'
        working-directory: frontend
        run: npx vercel pull --yes --environment=production --token "$VERCEL_TOKEN"

      - name: Build Vercel output
        if: steps.vercel.outputs.configured == 'true'
        working-directory: frontend
        run: npx vercel build --prod --token "$VERCEL_TOKEN"

      - name: Deploy to Vercel
        if: steps.vercel.outputs.configured == 'true'
        working-directory: frontend
        run: npx vercel deploy --prebuilt --prod --token "$VERCEL_TOKEN"
